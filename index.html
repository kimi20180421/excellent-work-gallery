<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080909">
  <title>像素100&奇点同行 · 优秀作业展</title>
  <style>
    :root {
      color-scheme: dark;
      --black: #080909;
      --white: #f4f7f8;
      --muted: rgba(244, 247, 248, .56);
      --blue: #3159d9;
      --cyan: #63d8e8;
      --radius: clamp(16px, 1.5vw, 24px);
      --ease: cubic-bezier(.16, 1, .3, 1);
      --duration: 680ms;
      --autoplay: 5600ms;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--black);
    }

    body {
      color: var(--white);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button { font: inherit; }

    .site-header {
      position: fixed;
      inset: 0 0 auto;
      z-index: 20;
      height: clamp(66px, 8.5vh, 88px);
      display: flex;
      align-items: center;
      padding-inline: clamp(18px, 3vw, 48px);
      pointer-events: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      color: var(--white);
      font-size: clamp(15px, 1.2vw, 19px);
      font-weight: 500;
      line-height: 1.4;
      text-decoration: none;
      pointer-events: auto;
    }

    .brand-logo {
      width: clamp(25px, 2.2vw, 32px);
      height: auto;
      display: block;
    }

    .brand-suffix {
      color: var(--muted);
      font-weight: 400;
    }

    .carousel {
      position: relative;
      width: 100vw;
      height: 100svh;
      min-height: 520px;
      overflow: hidden;
      touch-action: pan-y;
      user-select: none;
      background:
        radial-gradient(circle at 50% 44%, rgba(49, 89, 217, .08), transparent 42%),
        var(--black);
    }

    .slides {
      position: absolute;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      margin: 0;
      padding: clamp(76px, 10vh, 108px) clamp(18px, 6vw, 96px) clamp(78px, 9vh, 104px);
      opacity: 0;
      visibility: hidden;
      transform: translate3d(10%, 0, 0) scale(.985);
      transition:
        transform var(--duration) var(--ease),
        opacity 420ms ease,
        visibility 0s linear var(--duration);
      will-change: transform, opacity;
      pointer-events: none;
    }

    .slide[data-state="before"] {
      transform: translate3d(-10%, 0, 0) scale(.985);
    }

    .slide[data-state="active"] {
      z-index: 2;
      opacity: 1;
      visibility: visible;
      transform: translate3d(0, 0, 0) scale(1);
      transition-delay: 0s;
      pointer-events: auto;
    }

    .artwork {
      position: relative;
      width: min(88vw, 1440px, calc((100svh - 232px) * 16 / 9));
    }

    .artwork img {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      display: block;
      object-fit: contain;
      object-position: center;
      overflow: hidden;
      border-radius: var(--radius);
      background: #101314;
      box-shadow: 0 28px 90px rgba(0, 0, 0, .48);
    }

    .caption {
      display: flex;
      align-items: center;
      padding: clamp(12px, 1.3vw, 18px) 2px 0;
      color: rgba(244, 247, 248, .78);
    }

    .student {
      font-size: clamp(14px, 1.15vw, 18px);
      font-weight: 500;
      letter-spacing: .04em;
    }

    .carousel-guide {
      position: fixed;
      left: 50%;
      bottom: clamp(26px, 4vh, 42px);
      z-index: 20;
      width: min(62vw, 360px);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: clamp(5px, .65vw, 9px);
      transform: translateX(-50%);
    }

    .guide-item {
      position: relative;
      height: 18px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .guide-item::before,
    .guide-item::after {
      content: "";
      position: absolute;
      inset: 8px 0 auto;
      height: 2px;
      border-radius: 99px;
    }

    .guide-item::before { background: rgba(255, 255, 255, .2); }

    .guide-item::after {
      background: var(--cyan);
      transform: scaleX(0);
      transform-origin: left center;
    }

    .guide-item[aria-current="true"]::before { background: rgba(255, 255, 255, .34); }

    .guide-item[aria-current="true"]::after {
      animation: progress var(--autoplay) linear forwards;
    }

    .guide-item:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 4px;
      border-radius: 4px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes progress {
      to { transform: scaleX(1); }
    }

    @media (max-width: 680px) {
      .site-header { height: 64px; }
      .brand { gap: 8px; }
      .brand-suffix { display: none; }
      .slide { padding: 72px 12px 82px; }
      .artwork {
        width: min(calc(100vw - 24px), calc((100svh - 208px) * 16 / 9));
      }
      .artwork img { border-radius: 16px; }
      .carousel-guide { width: calc(100vw - 36px); gap: 4px; bottom: 25px; }
      .caption { padding: 12px 2px 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide {
        transition-duration: 1ms !important;
        transform: none !important;
      }
      .guide-item[aria-current="true"]::after {
        animation: none;
        transform: scaleX(1);
      }
    }
  </style>
</head>

  <script>
    const carousel = document.querySelector('.carousel');
    const slides = [...document.querySelectorAll('.slide')];
    const guideItems = [...document.querySelectorAll('.guide-item')];
    const status = document.querySelector('#carousel-status');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
    const AUTOPLAY_DELAY = 5600;
    let current = 0;
    let timer;
    let pointerStartX = null;

    function setSlide(nextIndex, restart = true) {
      const normalized = (nextIndex + slides.length) % slides.length;
      if (normalized === current && !restart) return;

      slides.forEach((slide, index) => {
        slide.dataset.state = index === normalized ? 'active' : index < normalized ? 'before' : 'after';
        slide.setAttribute('aria-hidden', String(index !== normalized));
      });

      guideItems.forEach((item, index) => {
        item.setAttribute('aria-current', String(index === normalized));
      });

      current = normalized;
      const name = slides[current].querySelector('.student').textContent;
      status.textContent = `正在展示第 ${current + 1} 张作品，${name}`;

      if (restart) startAutoplay();
    }

    function startAutoplay() {
      clearTimeout(timer);
      if (reducedMotion.matches || document.hidden) return;
      timer = setTimeout(() => setSlide(current + 1), AUTOPLAY_DELAY);
    }

    guideItems.forEach(item => {
      item.addEventListener('click', () => setSlide(Number(item.dataset.index)));
    });

    carousel.addEventListener('keydown', event => {
      if (event.key === 'ArrowRight') setSlide(current + 1);
      if (event.key === 'ArrowLeft') setSlide(current - 1);
    });

    carousel.addEventListener('pointerdown', event => {
      pointerStartX = event.clientX;
    });

    carousel.addEventListener('pointerup', event => {
      if (pointerStartX === null) return;
      const distance = event.clientX - pointerStartX;
      pointerStartX = null;
      if (Math.abs(distance) < 50) return;
      setSlide(distance < 0 ? current + 1 : current - 1);
    });

    document.addEventListener('visibilitychange', startAutoplay);
    reducedMotion.addEventListener('change', startAutoplay);
    setSlide(0);
  </script>
