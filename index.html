<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#eaf2fb">
  <title>像素100&奇点同行 · 优秀作业展</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #eaf2fb;
      --ink: #142650;
      --muted: #66769a;
      --blue: #3159d9;
      --header-h: 68px;
      --gutter: clamp(8px, 0.75vw, 14px);
      --page-pad: clamp(12px, 1.35vw, 24px);
      --card-radius: 22px;
    }

    * { box-sizing: border-box; }

    html {
      background: var(--paper);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      background-image:
        radial-gradient(circle at 82% 8%, rgba(255, 217, 117, .28), transparent 22%),
        radial-gradient(circle at 12% 36%, rgba(149, 211, 255, .30), transparent 28%),
        linear-gradient(145deg, #edf6ff 0%, #dcecff 52%, #e9f4ff 100%);
      background-attachment: fixed;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "SimSun", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, a { -webkit-tap-highlight-color: transparent; }

    .site-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: var(--page-pad);
      background: rgba(234, 242, 251, .92);
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(18px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      color: var(--ink);
      text-decoration: none;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.4;
    }

    .brand-logo {
      width: 32px;
      height: auto;
      display: block;
    }

    .brand-suffix {
      margin-left: 1px;
      color: var(--muted);
      font-weight: 400;
    }

    .top-nav {
      display: flex;
      align-items: center;
      gap: clamp(22px, 3.4vw, 54px);
      font-size: 14px;
    }

    .top-nav a {
      color: var(--muted);
      text-decoration: none;
      transition: color 180ms ease;
    }

    .top-nav a:hover,
    .top-nav a[aria-current="page"] { color: var(--blue); }

    main {
      padding: var(--gutter) var(--page-pad) clamp(96px, 10vh, 128px);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      /* 每个基础格固定为 4:3，行高由脚本根据实际列宽精确计算 */
      grid-auto-rows: var(--grid-row, 180px);
      grid-auto-flow: dense;
      gap: var(--gutter);
      min-height: calc(100vh - var(--header-h) - var(--gutter));
    }

    .work {
      --delay: 0ms;
      position: relative;
      margin: 0;
      min-width: 0;
      overflow: hidden;
      border-radius: var(--card-radius);
      background: #dcecff;
      isolation: isolate;
      opacity: 0;
      transform: translateY(18px);
      animation: enter 680ms cubic-bezier(.16, 1, .3, 1) forwards;
      animation-delay: var(--delay);
    }

    .work.featured { grid-column: span 2; grid-row: span 2; }

    .work.is-filtered-out { display: none; }

    .work img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      aspect-ratio: auto;
      transform: scale(1.015);
      transition: transform 700ms cubic-bezier(.16, 1, .3, 1), filter 400ms ease;
    }

    .caption {
      position: absolute;
      inset: auto 0 0;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      min-height: 25%;
      padding: clamp(13px, 1.2vw, 20px);
      color: #fff;
      background: linear-gradient(to top, rgba(20, 38, 80, .78), rgba(20, 38, 80, .16) 58%, transparent);
      transition: min-height 500ms cubic-bezier(.16, 1, .3, 1);
    }

    .student {
      font-size: clamp(13px, 1vw, 16px);
      font-weight: 500;
      letter-spacing: .02em;
      text-shadow: 0 1px 12px rgba(20, 38, 80, .42);
    }

    .work:hover img { transform: scale(1.06); filter: saturate(1.04); }
    .work:hover .caption { min-height: 31%; }

    .filter-dock {
      position: fixed;
      left: 50%;
      bottom: clamp(14px, 2.2vh, 28px);
      z-index: 40;
      max-width: calc(100vw - 24px);
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 16px 34px rgba(49, 89, 150, .14);
      backdrop-filter: blur(24px) saturate(1.25);
    }

    .filter-dock::-webkit-scrollbar { display: none; }

    .filter {
      flex: 0 0 auto;
      border: 0;
      border-radius: 999px;
      padding: 10px 21px;
      color: var(--ink);
      background: transparent;
      font: inherit;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .filter:hover { background: #f3f8ff; }
    .filter:active { transform: scale(.97); }
    .filter[aria-pressed="true"] {
      color: #fff;
      background: var(--blue);
      font-weight: 700;
    }
    .filter:focus-visible { outline: 3px solid color-mix(in oklch, var(--blue) 32%, transparent); outline-offset: 2px; }

    @keyframes enter {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      .gallery {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      :root { --header-h: 60px; --page-pad: 8px; --gutter: 7px; }
      .brand { font-size: 16px; }
      .brand-logo { width: 27px; }
      .top-nav { display: none; }
      main { padding-bottom: 90px; }
      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .work.featured { grid-column: span 2; grid-row: span 2; }
      .caption { min-height: 28%; }
      .filter-dock {
        left: 8px;
        right: 8px;
        transform: none;
        max-width: none;
      }
      .filter { padding: 9px 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: 1ms !important; transition-duration: 1ms !important; }
    }
  </style>
</head>

  <script>
    const gallery = document.querySelector('.gallery');
    const works = [...document.querySelectorAll('.work')];
    const filters = [...document.querySelectorAll('.filter')];

    function syncFixedRatios() {
      const columns = window.innerWidth <= 680 ? 2 : window.innerWidth <= 980 ? 3 : 4;
      const styles = getComputedStyle(gallery);
      const gap = parseFloat(styles.columnGap) || 0;
      const columnWidth = (gallery.clientWidth - gap * (columns - 1)) / columns;

      // 基础作品为 4:3；2×2 主图仍保持同一比例，图片始终等比裁切。
      gallery.style.setProperty('--grid-row', `${columnWidth * 0.75}px`);
    }

    let resizeFrame;
    window.addEventListener('resize', () => {
      cancelAnimationFrame(resizeFrame);
      resizeFrame = requestAnimationFrame(syncFixedRatios);
    });
    syncFixedRatios();

    function applyFilter(category) {
      filters.forEach(button => {
        button.setAttribute('aria-pressed', String(button.dataset.filter === category));
      });

      works.forEach(work => {
        work.classList.remove('featured');
        work.classList.toggle(
          'is-filtered-out',
          category !== '全部' && work.dataset.category !== category
        );
      });

      const visible = works.filter(work => !work.classList.contains('is-filtered-out'));
      if (visible[0]) visible[0].classList.add('featured');

      visible.forEach((work, index) => {
        work.style.animation = 'none';
        requestAnimationFrame(() => {
          work.style.setProperty('--delay', `${index * 45}ms`);
          work.style.animation = '';
        });
      });
    }

    filters.forEach(button => {
      button.addEventListener('click', () => applyFilter(button.dataset.filter));
    });
  </script>
</body>
</html>
